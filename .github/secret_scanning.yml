# Secret-scanning configuration.
# This repo ships a deliberate corpus of *synthetic* secret-shaped strings
# inside its test fixtures (src/test/redactor*.test.ts) and supporting
# documentation. None of the values are real credentials — they only exist
# so the redactor regression tests can verify that real secrets in user
# context are redacted before reaching any LLM.
#
# We allow-list those paths so GitHub secret scanning + push protection
# don't flag synthetic test data as a security incident. Production code
# paths (src/*.ts excluding src/test/) remain fully scanned.

paths-ignore:
  - "src/test/**"
  - "out-test/**"
  - "docs/**"
