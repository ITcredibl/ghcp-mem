<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" role="img" aria-label="Animated terminal: code --install-extension ITcredibl.ghcp-mem, then 'Installed successfully' and a 'READY TO USE' badge.">
  <defs>
    <linearGradient id="termBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e1e2e"/>
      <stop offset="1" stop-color="#11111b"/>
    </linearGradient>
    <clipPath id="typeClip">
      <rect x="0" y="48" width="0" height="22">
        <animate attributeName="width" values="0;420" dur="1.6s" begin="0.3s" fill="freeze"/>
      </rect>
    </clipPath>
  </defs>

  <!-- terminal frame -->
  <rect width="720" height="220" rx="10" fill="url(#termBg)"/>
  <rect width="720" height="32" rx="10" fill="#181825"/>
  <rect y="22" width="720" height="10" fill="#181825"/>

  <!-- traffic-light buttons -->
  <circle cx="20" cy="16" r="6" fill="#ed8796"/>
  <circle cx="40" cy="16" r="6" fill="#eed49f"/>
  <circle cx="60" cy="16" r="6" fill="#a6da95"/>
  <text x="360" y="20" fill="#9399b2" font-size="11" text-anchor="middle">~ — zsh — 80×24</text>

  <g font-size="14">
    <!-- prompt -->
    <text x="20" y="65" fill="#a6da95">$</text>

    <!-- typed command revealed by growing clipPath -->
    <g clip-path="url(#typeClip)">
      <text x="38" y="65" fill="#cdd6f4">code --install-extension ITcredibl.ghcp-mem</text>
    </g>

    <!-- blinking cursor that walks to end of line then disappears -->
    <rect x="38" y="51" width="8" height="16" fill="#cdd6f4">
      <animate attributeName="x" values="38;420" dur="1.6s" begin="0.3s" fill="freeze"/>
      <animate attributeName="opacity" values="1;0;1;0;1" dur="0.6s" repeatCount="4"/>
      <animate attributeName="opacity" to="0" dur="0.1s" begin="2.2s" fill="freeze"/>
    </rect>

    <!-- response line 1 -->
    <text x="20" y="100" fill="#89b4fa" opacity="0">
      Installing extensions...
      <animate attributeName="opacity" values="0;1" dur="0.2s" begin="2.5s" fill="freeze"/>
    </text>

    <!-- response line 2 -->
    <text x="20" y="124" fill="#cdd6f4" opacity="0">
      Extension '<tspan fill="#fab387">ITcredibl.ghcp-mem</tspan>' v<tspan fill="#a6e3a1">1.1.8</tspan> was successfully installed.
      <animate attributeName="opacity" values="0;1" dur="0.2s" begin="3.4s" fill="freeze"/>
    </text>

    <!-- success badge -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="3.8s" fill="freeze"/>
      <rect x="20" y="148" width="160" height="28" rx="14" fill="#a6e3a1"/>
      <text x="100" y="167" fill="#11111b" font-size="13" font-weight="700" text-anchor="middle">✓ READY TO USE</text>
    </g>

    <!-- next prompt with blinking cursor -->
    <text x="20" y="200" fill="#a6da95" opacity="0">$<animate attributeName="opacity" values="0;1" dur="0.2s" begin="4.2s" fill="freeze"/></text>
    <rect x="38" y="186" width="8" height="16" fill="#cdd6f4" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.2s" begin="4.2s" fill="freeze"/>
      <animate attributeName="opacity" values="1;0;1" dur="0.8s" begin="4.4s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
