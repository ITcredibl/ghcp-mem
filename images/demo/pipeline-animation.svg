<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 240" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" role="img" aria-label="GHCP-MEM pipeline: code edits flow through redactor, AI summariser, and store, then return as recalled memory in @mem chat.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <radialGradient id="glow">
      <stop offset="0" stop-color="#60a5fa" stop-opacity="0.9"/>
      <stop offset="0.5" stop-color="#60a5fa" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#60a5fa" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowGreen">
      <stop offset="0" stop-color="#4ade80" stop-opacity="0.9"/>
      <stop offset="0.5" stop-color="#4ade80" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#4ade80" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feOffset dy="2" result="off"/>
      <feMerge><feMergeNode in="off"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- background -->
  <rect width="960" height="240" fill="url(#bg)" rx="14"/>

  <!-- title -->
  <text x="480" y="34" fill="#94a3b8" font-size="13" text-anchor="middle" letter-spacing="2">CODE  →  PROTECT  →  COMPRESS  →  REMEMBER  →  RECALL</text>

  <!-- Stage 1: You code -->
  <g filter="url(#softShadow)">
    <rect x="40" y="80" width="140" height="80" rx="10" fill="#3b82f6" stroke="#1d4ed8" stroke-width="2"/>
    <text x="110" y="115" fill="#fff" font-size="16" font-weight="600" text-anchor="middle">📝 You code</text>
    <text x="110" y="138" fill="#dbeafe" font-size="11" text-anchor="middle">edits · git · debug · tasks</text>
  </g>

  <!-- Stage 2: Redact -->
  <g filter="url(#softShadow)">
    <rect x="220" y="80" width="140" height="80" rx="10" fill="#7c3aed" stroke="#5b21b6" stroke-width="2"/>
    <text x="290" y="115" fill="#fff" font-size="16" font-weight="600" text-anchor="middle">🔒 Redact</text>
    <text x="290" y="138" fill="#e9d5ff" font-size="11" text-anchor="middle">24-rule scrubber</text>
  </g>

  <!-- Stage 3: Summarise -->
  <g filter="url(#softShadow)">
    <rect x="400" y="80" width="160" height="80" rx="10" fill="#7c3aed" stroke="#5b21b6" stroke-width="2"/>
    <text x="480" y="115" fill="#fff" font-size="16" font-weight="600" text-anchor="middle">🤖 Summarise</text>
    <text x="480" y="138" fill="#e9d5ff" font-size="11" text-anchor="middle">vscode.lm · gpt-4o-mini</text>
  </g>

  <!-- Stage 4: Remember -->
  <g filter="url(#softShadow)">
    <rect x="600" y="80" width="140" height="80" rx="10" fill="#0ea5e9" stroke="#0369a1" stroke-width="2"/>
    <text x="670" y="115" fill="#fff" font-size="16" font-weight="600" text-anchor="middle">🗄️ Remember</text>
    <text x="670" y="138" fill="#bae6fd" font-size="11" text-anchor="middle">forever · per-user</text>
  </g>

  <!-- Stage 5: Recall -->
  <g filter="url(#softShadow)">
    <rect x="780" y="80" width="140" height="80" rx="10" fill="#22c55e" stroke="#15803d" stroke-width="2"/>
    <text x="850" y="115" fill="#fff" font-size="16" font-weight="600" text-anchor="middle">💬 @mem</text>
    <text x="850" y="138" fill="#dcfce7" font-size="11" text-anchor="middle">instant recall</text>
  </g>

  <!-- single combined path for animation -->
  <path id="flow" d="M180 120 L220 120 M360 120 L400 120 M560 120 L600 120 M740 120 L780 120" stroke="#475569" stroke-width="2" fill="none" stroke-dasharray="3 4" opacity="0.7"/>

  <!-- chevrons between boxes -->
  <g fill="#64748b">
    <polygon points="195,115 205,120 195,125"/>
    <polygon points="375,115 385,120 375,125"/>
    <polygon points="575,115 585,120 575,125"/>
    <polygon points="755,115 765,120 755,125"/>
  </g>

  <!-- Animated pulse 1: traveling left to right -->
  <circle r="20" fill="url(#glow)">
    <animate attributeName="cx" values="180;920" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="120;120" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;1;0" keyTimes="0;0.05;0.5;0.95;1" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle r="6" fill="#93c5fd">
    <animate attributeName="cx" values="180;920" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="120;120" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;1;0" keyTimes="0;0.05;0.5;0.95;1" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- Pulse 2: staggered, green (the recalled context) -->
  <circle r="20" fill="url(#glowGreen)">
    <animate attributeName="cx" values="180;920" dur="4s" begin="2s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="120;120" dur="4s" begin="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;1;0" keyTimes="0;0.05;0.5;0.95;1" dur="4s" begin="2s" repeatCount="indefinite"/>
  </circle>
  <circle r="6" fill="#86efac">
    <animate attributeName="cx" values="180;920" dur="4s" begin="2s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="120;120" dur="4s" begin="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;1;0" keyTimes="0;0.05;0.5;0.95;1" dur="4s" begin="2s" repeatCount="indefinite"/>
  </circle>

  <!-- footer line -->
  <text x="480" y="200" fill="#64748b" font-size="11" text-anchor="middle">Zero deps · Zero ports · MIT · 24-rule redaction · Native MCP</text>
  <text x="480" y="220" fill="#475569" font-size="10" text-anchor="middle">— animated SVG · view source on github.com/ITcredibl/ghcp-mem —</text>
</svg>
